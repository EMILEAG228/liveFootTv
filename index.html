<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMILE AG LIVE FOOT TV</title>
    <style>
        :root {
            --primary: #00ffc8;
            --bg: #050a0f;
            --card-bg: #121a24;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: white;
            text-align: center;
        }

        header {
            padding: 40px 20px;
            background: linear-gradient(to bottom, #001f3f, transparent);
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0, 255, 200, 0.4);
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .channel-link {
            text-decoration: none;
            color: white;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .channel-link:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 255, 200, 0.2);
        }

        .channel-link img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .channel-link span {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .live-badge {
            background: #ff4757;
            padding: 2px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            margin-top: 10px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            opacity: 0.5;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>⚽ EMILE AG LIVE FOOT TV</h1>
        <p>Cliquez sur un logo pour regarder le match en direct</p>
    </header>

    <main class="container" id="channel-list">
        </main>

    <footer>
        <p id="copyright"></p>
    </footer>

    <script>
        const matches = [
            {
                nom: "Real Madrid Live",
                lien: "https://www.koora-tv.com/",
                img: "https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg"
            },
            {
                nom: "PSG Live",
                lien: "https://www.elitegoltv.org/home.php",
                img: "https://upload.wikimedia.org/wikipedia/en/a/a7/Paris_Saint-Germain_F.C..svg"
            },
            {
                nom: "FC Barcelona Live",
                lien: "https://m.livetv.sx/frx/",
                img: "https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg"
            },
            {
                nom: "Chelsea Live",
                lien: "https://letzcricket.com/",
                img: "https://upload.wikimedia.org/wikipedia/en/c/cc/Chelsea_FC.svg"
            }
        ];

        const container = document.getElementById('channel-list');

        matches.forEach(match => {
            const a = document.createElement('a');
            a.href = match.lien;
            a.target = "_blank"; // Ouvre dans un nouvel onglet
            a.className = "channel-link";
            
            a.innerHTML = `
                <img src="${match.img}" alt="${match.nom}">
                <span>${match.nom}</span>
                <div class="live-badge">DIRECT</div>
            `;
            
            container.appendChild(a);
        });

        document.getElementById("copyright").innerHTML = 
            `&copy; ${new Date().getFullYear()} - EMILE AG LIVE FOOT TV`;
    </script>
</body>
</html>
