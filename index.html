<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="https://emileag228.github.io/AmiBa.Web/MyPhoto12_23_2024_10_02_17_PM.png" type="image/png">
  <title>Live TV</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #001f3f, #000);
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 30px;
      background: linear-gradient(90deg, #0a0a0a, #001f3f);
      box-shadow: 0 4px 20px rgba(0,0,0,0.8);
      animation: fadeIn 1.5s ease-out;
    }

    h1 {
      margin: 0;
      font-size: 3.5rem;
      font-weight: bold;
      background: linear-gradient(90deg, #1e90ff, #00ffc8, #ffd700);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientText 6s ease infinite;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      padding: 40px 20px;
      animation: fadeIn 2s ease-in;
    }

    .card {
      background: linear-gradient(145deg, #0a0a0a, #001f3f);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 0 25px rgba(30,144,255,0.4);
      transition: transform 0.4s, box-shadow 0.4s;
      animation: pulse 3s infinite;
    }

    .card:hover {
      transform: scale(1.08);
      box-shadow: 0 0 40px rgba(255,215,0,0.8);
    }

    .card a {
      text-decoration: none;
      color: #00ffc8;
      font-size: 1.3rem;
      font-weight: bold;
      display: block;
      margin-top: 15px;
      transition: color 0.3s;
    }

    .card a:hover {
      color: #ffd700;
    }

    .card a img {
      width: 100%;
      height: 180px;
      object-fit: contain;
      border-radius: 15px;
      transition: transform 0.4s, box-shadow 0.4s;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
    }

    .card a img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(30,144,255,0.7);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: linear-gradient(90deg, #0a0a0a, #001f3f);
      font-size: 0.95rem;
      color: #ccc;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.8);
    }

    @keyframes gradientText {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 20px rgba(30,144,255,0.3); }
      50% { box-shadow: 0 0 40px rgba(255,215,0,0.6); }
      100% { box-shadow: 0 0 20px rgba(30,144,255,0.3); }
    }
  </style>
</head>
<body>
  <header>
    <h1>🏆 Champions League & LaLiga ... Foot Live</h1>
    <p>Regarde les plus grands matchs en direct avec style !</p>
  </header>

  <main id="live-links">
    <!-- Liens injectés ici -->
  </main>

  <footer>
    <p id="copyright"></p>
  </footer>

  <script>
    const liens = [
      {
        nom: "Real Madrid Live",
        url: "https://www.koora-tv.com/",
        image: "https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg"
      },
      {
        nom: "PSG Live",
        url: "https://www.elitegoltv.org/home.php",
        image: "https://upload.wikimedia.org/wikipedia/en/a/a7/Paris_Saint-Germain_F.C..svg"
      },
      {
        nom: "FC Barcelona Live",
        url: "https://m.livetv.sx/frx/",
        image: "https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg"
      },
      {
        nom: "Chelsea Live",
        url: "https://letzcricket.com/",
        image: "https://upload.wikimedia.org/wikipedia/en/c/cc/Chelsea_FC.svg"
      }
    ];

    const container = document.getElementById("live-links");

    liens.forEach((lien) => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <a href="${lien.url}" target="_blank">
          <img src="${lien.image}" alt="${lien.nom}">
          ${lien.nom}
        </a>
      `;
      container.appendChild(card);
    });

    // Copyright dynamique
    const year = new Date().getFullYear();
    document.getElementById("copyright").innerHTML =
      `&copy; ${year} - Tous droits réservés | AmiBa Groupe & MARC AZ`;
  </script>
</body>
</html>
