<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMILE AG LIVE FOOT TV | World Cup Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.6);
            --primary: #00E0B8;
            --bg: #030508;
            --card-bg: rgba(18, 26, 36, 0.6);
            --border: rgba(212, 175, 55, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg);
            color: white;
            text-align: center;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Background effet stade + particules */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(0, 224, 184, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(212, 175, 55, 0.1) 0%, transparent 40%),
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="1" fill="white" opacity="0.1"/></svg>');
            background-size: cover, cover, 3px 3px;
            z-index: -2;
            animation: bgMove 20s ease-in-out infinite alternate;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(3,5,8,0) 0%, rgba(3,5,8,0.9) 100%);
            z-index: -1;
        }

        @keyframes bgMove {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.1) rotate(2deg); }
        }

        header {
            padding: 60px 20px 40px;
            position: relative;
        }

        .header-badge {
            display: inline-block;
            padding: 6px 18px;
            border: 1px solid var(--gold);
            border-radius: 50px;
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: var(--gold);
            margin-bottom: 20px;
            animation: fadeInDown 1s ease;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            margin: 0;
            background: linear-gradient(135deg, #fff 0%, var(--gold) 50%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
            text-shadow: 0 0 40px var(--gold-glow);
            animation: fadeInDown 1s ease 0.2s backwards, titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 20px var(--gold-glow)); }
            100% { filter: drop-shadow(0 0 35px var(--gold-glow)); }
        }

        header p {
            margin-top: 15px;
            font-weight: 300;
            opacity: 0.7;
            font-size: 1.1rem;
            animation: fadeInDown 1s ease 0.4s backwards;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .channel-link {
            position: relative;
            text-decoration: none;
            color: white;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            animation: fadeInUp 0.8s ease backwards;
        }

        /* Effet lumière qui traverse */
        .channel-link::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(212, 175, 55, 0.15), transparent);
            transform: rotate(45deg);
            transition: all 0.6s ease;
            opacity: 0;
        }

        .channel-link:hover::before {
            animation: shine 1.5s ease;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); opacity: 0; }
        }

        .channel-link:hover {
            transform: translateY(-15px) scale(1.03);
            border-color: var(--gold);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px var(--gold-glow);
        }

        .channel-link img {
            width: 110px;
            height: 110px;
            object-fit: contain;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.5));
            transition: transform 0.4s ease;
        }

        .channel-link:hover img {
            transform: scale(1.15) rotate(3deg);
        }

        .channel-link span {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .live-badge {
            position: relative;
            background: linear-gradient(135deg, #ff3838, #ff0000);
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.5); }
        }

        footer {
            margin-top: 60px;
            padding: 30px 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
            opacity: 0.6;
            font-size: 0.9rem;
        }

        /* Animations d'entrée */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Délai cascade pour les cartes */
        .channel-link:nth-child(1) { animation-delay: 0.2s; }
        .channel-link:nth-child(2) { animation-delay: 0.3s; }
        .channel-link:nth-child(3) { animation-delay: 0.4s; }
        .channel-link:nth-child(4) { animation-delay: 0.5s; }

        /* Responsive */
        @media (max-width: 768px) {
            header { padding: 40px 15px 20px; }
            .container { gap: 20px; padding: 20px 15px; }
            .channel-link { padding: 25px 15px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-badge">WORLD CUP EDITION</div>
        <h1>⚽ EMILE AG LIVE FOOT TV</h1>
        <p>Sélectionnez votre match et vivez l’expérience en direct</p>
    </header>

    <main class="container" id="channel-list"></main>

    <footer>
        <p id="copyright"></p>
    </footer>

    <script>
        const matches = [
            {
                nom: "Real Madrid Live",
                lien: "https://www.koora-tv.com/",
                img: "https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg"
            },
            {
                nom: "PSG Live",
                lien: "https://www.elitegoltv.org/home.php",
                img: "https://upload.wikimedia.org/wikipedia/en/a/a7/Paris_Saint-Germain_F.C..svg"
            },
            {
                nom: "FC Barcelona Live",
                lien: "https://m.livetv.sx/frx/",
                img: "https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg"
            },
            {
                nom: "Chelsea Live",
                lien: "https://letzcricket.com/",
                img: "https://upload.wikimedia.org/wikipedia/en/c/cc/Chelsea_FC.svg"
            }
        ];

        const container = document.getElementById('channel-list');

        matches.forEach(match => {
            const a = document.createElement('a');
            a.href = match.lien;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.className = "channel-link";
            
            a.innerHTML = `
                <img src="${match.img}" alt="${match.nom}" loading="lazy">
                <span>${match.nom}</span>
                <div class="live-badge">EN DIRECT</div>
            `;
            
            container.appendChild(a);
        });

        document.getElementById("copyright").innerHTML = 
            `&copy; ${new Date().getFullYear()} - EMILE AG LIVE FOOT TV | All Rights Reserved`;
    </script>
</body>
</html>
