<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" href="https://emileag228.github.io/AmiBa.Web/MyPhoto12_23_2024_10_02_17_PM.png" type="image/png">
    <title>Premium Live TV | Koora Elite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap');

        :root {
            --accent: #00e676; /* Vert sport */
            --bg: #0a0e14;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 50px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #16213e, transparent);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(0, 230, 118, 0.5);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 90%;
        }

        .channel-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .channel-card:hover {
            transform: scale(1.05);
            border-color: var(--accent);
            box-shadow: 0 10px 25px rgba(0, 230, 118, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        .channel-card img {
            width: 100%;
            max-width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
            margin-bottom: 15px;
        }

        .channel-card span {
            display: block;
            font-weight: 500;
            font-size: 1.1rem;
        }

        /* LECTEUR OVERLAY */
        #player-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.98);
            z-index: 1000;
            flex-direction: column;
        }

        .player-nav {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .close-btn {
            background: #ff3e3e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .close-btn:hover { background: #ff0000; }

        .video-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        iframe {
            width: 100%;
            max-width: 1100px;
            height: 80%;
            border: 2px solid #222;
            border-radius: 10px;
            background: #000;
        }

        footer {
            margin-top: auto;
            padding: 40px;
            text-align: center;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>

<header>
    <h1>Arena Streaming</h1>
    <p>Sélectionnez une chaîne pour regarder le direct</p>
</header>

<main class="grid-container" id="links-grid"></main>

<div id="player-overlay">
    <div class="player-nav">
        <h2 id="video-title" style="margin:0; color: var(--accent);">Direct</h2>
        <button class="close-btn" onclick="closeVideo()">FERMER ✕</button>
    </div>
    <div class="video-wrapper">
        <iframe id="main-iframe" src="" allowfullscreen allow="autoplay"></iframe>
    </div>
</div>

<footer>
    <p id="copy-text"></p>
</footer>

<script>
    const channels = [
        { name: "Real Madrid TV", url: "https://www.koora-tv.com/", img: "https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg" },
        { name: "PSG TV", url: "https://www.elitegoltv.org/home.php", img: "https://upload.wikimedia.org/wikipedia/en/a/a7/Paris_Saint-Germain_F.C..svg" },
        { name: "Barça TV", url: "https://m.livetv.sx/frx/", img: "https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg" },
        { name: "Chelsea TV", url: "https://letzcricket.com/", img: "https://upload.wikimedia.org/wikipedia/en/c/cc/Chelsea_FC.svg" }
    ];

    const grid = document.getElementById('links-grid');
    const overlay = document.getElementById('player-overlay');
    const iframe = document.getElementById('main-iframe');
    const title = document.getElementById('video-title');

    // Génération des cartes
    channels.forEach(ch => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.innerHTML = `
            <img src="${ch.img}" alt="${ch.name}">
            <span>${ch.name}</span>
        `;
        card.onclick = () => {
            title.innerText = ch.name;
            iframe.src = ch.url;
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        };
        grid.appendChild(card);
    });

    function closeVideo() {
        overlay.style.display = 'none';
        iframe.src = "";
        document.body.style.overflow = 'auto';
    }

    document.getElementById("copy-text").innerHTML = `&copy; ${new Date().getFullYear()} - AmiBa Groupe & MARC AZ`;
</script>

</body>
</html>
