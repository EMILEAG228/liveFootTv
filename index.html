<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="https://emileag228.github.io/AmiBa.Web/MyPhoto12_23_2024_10_02_17_PM.png" type="image/png">
  <title>Live TV Premium | Style Koora</title>
  <style>
    :root {
      --primary: #00ffc8;
      --secondary: #1e90ff;
      --accent: #ffd700;
      --bg: #050505;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: #fff;
      overflow-x: hidden;
    }

    /* Fond animé */
    .bg-animation {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 50%, #001f3f 0%, #000 100%);
      z-index: -1;
    }

    header {
      text-align: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: clamp(1.8rem, 6vw, 3rem);
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* GRILLE DE CARTES */
    main {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: var(--primary);
      box-shadow: 0 10px 30px rgba(0, 255, 200, 0.2);
    }

    .card img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 10px;
    }

    /* L'OVERLAY DU LECTEUR (STYLE KOORA TV) */
    #video-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .player-header {
      width: 100%;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111;
      position: absolute;
      top: 0;
    }

    .match-title {
      color: var(--primary);
      font-weight: bold;
      font-size: 1.1rem;
      margin-left: 20px;
    }

    .close-btn {
      background: #ff4757;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      margin-right: 20px;
    }

    .iframe-container {
      width: 95%;
      max-width: 1100px;
      aspect-ratio: 16/9;
      background: #000;
      box-shadow: 0 0 50px rgba(0, 0, 0, 1);
      border: 1px solid #333;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    footer {
      text-align: center;
      padding: 30px;
      font-size: 0.8rem;
      opacity: 0.6;
    }

    /* Empêcher le défilement quand le lecteur est ouvert */
    .no-scroll {
      overflow: hidden;
    }
  </style>
</head>
<body>

  <div class="bg-animation"></div>

  <header>
    <h1>🏆 Live TV Center</h1>
    <p>Cliquez sur un logo pour lancer le direct</p>
  </header>

  <!-- L'Overlay "Koora" -->
  <div id="video-overlay">
    <div class="player-header">
      <span class="match-title" id="current-match-name">Chargement...</span>
      <button class="close-btn" onclick="closePlayer()">FERMER ✖</button>
    </div>
    <div class="iframe-container">
      <iframe id="main-player" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
  </div>

  <main id="live-links">
    <!-- Injecté par JS -->
  </main>

  <footer>
    <p id="copyright"></p>
  </footer>

  <script>
    const liens = [
      {
        nom: "Real Madrid Live",
        url: "https://www.koora-tv.com/",
        image: "https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg"
      },
      {
        nom: "PSG Live",
        url: "https://www.elitegoltv.org/home.php",
        image: "https://upload.wikimedia.org/wikipedia/en/a/a7/Paris_Saint-Germain_F.C..svg"
      },
      {
        nom: "FC Barcelona Live",
        url: "https://m.livetv.sx/frx/",
        image: "https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg"
      },
      {
        nom: "Chelsea Live",
        url: "https://letzcricket.com/",
        image: "https://upload.wikimedia.org/wikipedia/en/c/cc/Chelsea_FC.svg"
      }
    ];

    const container = document.getElementById("live-links");
    const overlay = document.getElementById("video-overlay");
    const player = document.getElementById("main-player");
    const title = document.getElementById("current-match-name");

    liens.forEach((lien) => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
          <img src="${lien.image}" alt="${lien.nom}">
          <div style="font-weight:600">${lien.nom}</div>
      `;
      
      card.onclick = () => {
        title.innerText = "Direct : " + lien.nom;
        player.src = lien.url;
        overlay.style.display = "flex";
        document.body.classList.add("no-scroll");
      };
      
      container.appendChild(card);
    });

    function closePlayer() {
      overlay.style.display = "none";
      player.src = ""; // Stop la vidéo et le son
      document.body.classList.remove("no-scroll");
    }

    document.getElementById("copyright").innerHTML =
      `&copy; ${new Date().getFullYear()} - AmiBa Groupe & MARC AZ`;
  </script>
</body>
</html>
